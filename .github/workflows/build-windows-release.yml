name: Build Windows Release

# Builds the AlienVox portable zip + installer exe (base tier: SAPI5
# only, no ML) and publishes both to a GitHub Release, listed as two
# clearly-labeled downloads. windows-latest runners ship with Inno Setup
# 6 preinstalled (ISCC on PATH), so build_exe.bat's ISCC auto-detection
# just works here.
#
# Two ways to trigger:
#   1. Manual (Actions tab -> "Run workflow"): tag defaults to the
#      version in python_app/version.yaml if you leave it blank — no
#      need to compute/type one yourself.
#   2. Push a tag matching v* (e.g. `git tag v0.0.20260721230113 && git
#      push origin v0.0.20260721230113`): that tag is used directly as
#      the release, no manual step needed.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create/publish to (e.g. v0.0.20260721230113). Defaults to the version in python_app/version.yaml."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a pre-release"
        required: false
        type: boolean
        default: true
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: python_app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build portable zip
        run: install\windows\portable\build_portable.bat
        shell: cmd

      - name: Build installer exe
        run: install\windows\exe\build_exe.bat
        shell: cmd

      - name: Read version
        id: version
        shell: bash
        run: |
          ver=$(grep '^version:' version.yaml | sed -E 's/version: *"(.*)"/\1/')
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Locate build artifacts
        id: artifacts
        shell: bash
        run: |
          zip=$(ls install/.venv-base-build/build/portable/*.zip)
          exe=$(ls install/.venv-base-build/build/exe/AlienVoxSetup-*.exe)
          echo "zip=$(basename "$zip")" >> "$GITHUB_OUTPUT"
          echo "exe=$(basename "$exe")" >> "$GITHUB_OUTPUT"
          echo "zip_path=$zip" >> "$GITHUB_OUTPUT"
          echo "exe_path=$exe" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.release_tag || format('v{0}', steps.version.outputs.version) }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: AlienVox ${{ steps.version.outputs.version }}
          prerelease: ${{ inputs.prerelease != false }}
          body: |
            Base tier (SAPI5 only, no ML) — two separate downloads:

            | Download | What it is |
            |---|---|
            | **${{ steps.artifacts.outputs.zip }}** | Portable — extract anywhere, run `AlienVox.exe`. No installer, no registry entries, no admin rights. |
            | **${{ steps.artifacts.outputs.exe }}** | Installer — Start Menu shortcut, optional desktop icon, proper uninstaller. Installs per-user, no admin required. |
          files: |
            python_app/${{ steps.artifacts.outputs.zip_path }}
            python_app/${{ steps.artifacts.outputs.exe_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
