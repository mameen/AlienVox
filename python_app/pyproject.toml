[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=src --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src"]
omit = [
    # UI layer — requires a running Qt display; covered by pytest-qt integration tests (Stage 2)
    "src/tray.py",
    "src/about.py",
    "src/preferences.py",
    "src/main.py",
    # Platform-specific boundaries — require Windows COM / audio hardware
    "src/capture.py",
    "src/engines/sapi_win.py",
    "src/hotkey.py",
    # Icon generator utility — not application logic
    "src/resources/*",
]
