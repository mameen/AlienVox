[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=src --cov-report=term-missing --cov-fail-under=80"
# test_perf.py passes --no-cov explicitly to suppress coverage overhead during timing runs

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.coverage.run]
source = ["src"]
omit = [
    # UI layer — requires a running Qt display; covered by pytest-qt integration tests (Stage 2)
    "src/tray.py",
    "src/about.py",
    "src/preferences.py",
    "src/main.py",
    "src/main_window.py",
    # Platform-specific boundaries — require Windows COM / audio hardware / foreground window
    "src/capture.py",
    "src/engines/sapi_win.py",
    "src/hotkey.py",
    # Icon generator utility — not application logic
    "src/resources/*",
]
