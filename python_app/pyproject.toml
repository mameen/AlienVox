[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=src --cov-report=term-missing --cov-fail-under=80 --ignore=tests/test_perf.py"
# test_perf.py is excluded from the default run: coverage instrumentation adds latency that
# breaks timing assertions. Run it separately: pytest tests/test_perf.py --no-cov

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.coverage.run]
source = ["src"]
omit = [
    # UI layer — requires a running Qt display; covered by pytest-qt integration tests (Stage 2)
    "src/view/tray.py",
    "src/view/about.py",
    "src/preferences.py",
    "src/main.py",
    "src/view/main_window.py",
    "src/view/install_dialog.py",
    # Platform-specific boundaries — require Windows COM / audio hardware / foreground window
    "src/control/capture.py",
    "src/engines/sapi_win.py",
    "src/engines/piper_win.py",
    "src/engines/kokoro_engine.py",
    "src/engines/chatterbox_engine.py",
    "src/engines/dia_engine.py",
    "src/engines/f5tts_engine.py",
    "src/engines/outetts_engine.py",
    "src/audio_player.py",
    "src/control/hotkey.py",
    # Icon generator utility — not application logic
    "src/resources/*",
    # Version string reader — no logic to test
    "src/version.py",
]
