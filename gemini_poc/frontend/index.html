<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balabolka - [Document1]</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Menu Bar */
        .menu-bar {
            display: flex;
            background-color: #ffffff;
            border-bottom: 1px solid #d0d0d0;
            padding: 2px 0;
            font-size: 12px;
            user-select: none;
        }

        .menu-item {
            padding: 4px 8px;
            cursor: pointer;
            position: relative;
        }

        .menu-item:hover {
            background-color: #e0e0e0;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            background-color: #f5f5f5;
            border-bottom: 1px solid #d0d0d0;
            padding: 4px 8px;
            gap: 4px;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 2px;
            padding-right: 8px;
            border-right: 1px solid #d0d0d0;
            margin-right: 4px;
        }

        .toolbar-group:last-child {
            border-right: none;
        }

        .toolbar-btn {
            width: 24px;
            height: 24px;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .toolbar-btn:hover {
            border-color: #a0a0a0;
            background-color: #e8e8e8;
        }

        .toolbar-btn.play {
            color: #22c55e;
        }

        .toolbar-btn.pause {
            color: #6b7280;
        }

        .toolbar-btn.stop {
            color: #ef4444;
        }

        /* Engine Tabs */
        .engine-tabs {
            display: flex;
            background-color: #e8e8e8;
            border-bottom: 1px solid #d0d0d0;
            padding: 0 8px;
        }

        .engine-tab {
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            border-bottom: 2px solid transparent;
            margin-right: 2px;
        }

        .engine-tab.active {
            background-color: #ffffff;
            border-bottom-color: #0078d4;
            font-weight: 500;
        }

        .engine-tab:hover:not(.active):not(.disabled) {
            background-color: #d8d8d8;
        }

        .engine-tab.disabled {
            color: #a0a0a0;
            cursor: default;
            pointer-events: none;
        }

        /* Voice Controls */
        .voice-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background-color: #f5f5f5;
            border-bottom: 1px solid #d0d0d0;
        }

        .voice-select {
            flex: 1;
            padding: 4px 8px;
            border: 1px solid #c0c0c0;
            background-color: #ffffff;
            font-size: 12px;
            height: 28px;
        }

        .voice-btn {
            padding: 4px 12px;
            border: 1px solid #c0c0c0;
            background-color: #ffffff;
            cursor: pointer;
            font-size: 12px;
            height: 28px;
        }

        .voice-btn:hover {
            background-color: #e8e8e8;
        }

        /* Audio Sliders */
        .audio-sliders {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 12px 8px;
            background-color: #fafafa;
            border-bottom: 1px solid #d0d0d0;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .slider-label {
            font-size: 11px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }

        .slider-value {
            font-weight: 500;
            color: #333;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(to right, #0078d4 0%, #0078d4 var(--value, 50%), #d0d0d0 var(--value, 50%), #d0d0d0 100%);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #ffffff;
            border: 2px solid #0078d4;
            border-radius: 50%;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #ffffff;
            border: 2px solid #0078d4;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Main Workspace */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px;
            background-color: #ffffff;
        }

        .text-editor {
            flex: 1;
            width: 100%;
            border: 1px solid #c0c0c0;
            resize: none;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            padding: 8px;
            outline: none;
        }

        .text-editor:focus {
            border-color: #0078d4;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            background-color: #f0f0f0;
            border-top: 1px solid #d0d0d0;
            font-size: 11px;
            color: #666;
        }

        .status-tabs {
            display: flex;
            gap: 2px;
        }

        .status-tab {
            padding: 2px 8px;
            background-color: #e0e0e0;
            border: 1px solid #c0c0c0;
            font-size: 11px;
        }

        .status-info {
            display: flex;
            gap: 16px;
        }

        /* Window Title Bar */
        .title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0;
        }

        .title-text {
            font-size: 12px;
            color: #333;
        }

        .window-controls {
            display: flex;
            gap: 2px;
        }

        .window-btn {
            width: 28px;
            height: 24px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .window-btn:hover {
            background-color: #e0e0e0;
        }

        .window-btn.close:hover {
            background-color: #e81123;
            color: white;
        }
    </style>
</head>
<body>
    <!-- Title Bar -->
    <div class="title-bar">
        <span class="title-text">Balabolka - [Document1]</span>
        <div class="window-controls">
            <button class="window-btn">─</button>
            <button class="window-btn">□</button>
            <button class="window-btn close">×</button>
        </div>
    </div>

    <!-- Menu Bar -->
    <div class="menu-bar">
        <div class="menu-item">File</div>
        <div class="menu-item">Edit</div>
        <div class="menu-item">Text</div>
        <div class="menu-item">Speech</div>
        <div class="menu-item">Voice</div>
        <div class="menu-item">Options</div>
        <div class="menu-item">View</div>
        <div class="menu-item">Tools</div>
        <div class="menu-item">Bookmark</div>
        <div class="menu-item">Help</div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-group">
            <button class="toolbar-btn" title="New File">📄</button>
            <button class="toolbar-btn" title="Open">📂</button>
            <button class="toolbar-btn" title="Save">💾</button>
        </div>
        <div class="toolbar-group">
            <button class="toolbar-btn" title="Split Text">✂️</button>
            <button class="toolbar-btn" title="Convert to Audio">🎵</button>
        </div>
        <div class="toolbar-group">
            <button class="toolbar-btn play" id="btn-play" title="Play">▶</button>
            <button class="toolbar-btn pause" id="btn-pause" title="Pause">⏸</button>
            <button class="toolbar-btn stop" id="btn-stop" title="Stop">⏹</button>
        </div>
        <div class="toolbar-group">
            <button class="toolbar-btn" title="Find">🔍</button>
            <button class="toolbar-btn" title="Spellcheck">✓</button>
        </div>
    </div>

    <!-- Engine Tabs — each selects a backend that filters the voice list. -->
    <div class="engine-tabs">
        <div class="engine-tab disabled" data-engine="sapi4" title="Legacy SAPI 4 — unavailable on modern Windows">SAPI 4</div>
        <div class="engine-tab active" data-engine="sapi5">SAPI 5</div>
        <div class="engine-tab" data-engine="speech_platform">Microsoft Speech Platform</div>
        <div class="engine-tab" data-engine="ml" title="Local neural ML/AI voices">ML / AI</div>
    </div>

    <!-- Voice Controls -->
    <div class="voice-controls">
        <select class="voice-select" id="voice-select">
            <option value="">Loading voices…</option>
        </select>
        <button class="voice-btn" type="button">About</button>
        <button class="voice-btn" id="btn-install" type="button" title="Install more voices">Install</button>
    </div>

    <!-- Audio Sliders -->
    <div class="audio-sliders">
        <div class="slider-group">
            <div class="slider-label">
                <span>Rate</span>
                <span class="slider-value" id="rate-value">0</span>
            </div>
            <input type="range" min="-10" max="10" value="0" id="rate-slider" style="--value: 50%">
        </div>
        <div class="slider-group">
            <div class="slider-label">
                <span>Pitch</span>
                <span class="slider-value" id="pitch-value">0</span>
            </div>
            <input type="range" min="-10" max="10" value="0" id="pitch-slider" style="--value: 50%">
        </div>
        <div class="slider-group">
            <div class="slider-label">
                <span>Volume</span>
                <span class="slider-value" id="volume-value">100</span>
            </div>
            <input type="range" min="0" max="100" value="100" id="volume-slider" style="--value: 100%">
        </div>
    </div>

    <!-- Main Workspace -->
    <div class="workspace">
        <textarea class="text-editor" placeholder="Enter or paste text here..." spellcheck="false"></textarea>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-tabs">
            <div class="status-tab">Document1</div>
        </div>
        <div class="status-info">
            <span id="cursor-position">Line: 1, Column: 1</span>
            <span>UTF-8</span>
        </div>
    </div>

    <script>
        // Slider value updates
        const sliders = ['rate', 'pitch', 'volume'];
        sliders.forEach(name => {
            const slider = document.getElementById(`${name}-slider`);
            const valueDisplay = document.getElementById(`${name}-value`);
            
            slider.addEventListener('input', (e) => {
                const min = parseFloat(e.target.min);
                const max = parseFloat(e.target.max);
                const value = parseFloat(e.target.value);
                const percentage = ((value - min) / (max - min)) * 100;
                
                e.target.style.setProperty('--value', `${percentage}%`);
                valueDisplay.textContent = value;
            });
        });

        // Cursor position tracking
        const textEditor = document.querySelector('.text-editor');
        const cursorPosition = document.getElementById('cursor-position');

        textEditor.addEventListener('input', updateCursorPosition);
        textEditor.addEventListener('click', updateCursorPosition);
        textEditor.addEventListener('keyup', updateCursorPosition);

        function updateCursorPosition() {
            const text = textEditor.value.substring(0, textEditor.selectionStart);
            const lines = text.split('\n');
            const line = lines.length;
            const column = lines[lines.length - 1].length + 1;
            cursorPosition.textContent = `Line: ${line}, Column: ${column}`;
        }

        // Tab switching — each tab selects an engine backend that filters the
        // voice list.  Disabled tabs (SAPI 4) are inert placeholders.
        const tabs = document.querySelectorAll('.engine-tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                if (tab.classList.contains('disabled')) return;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loadVoices({ force: false });
            });
        });

        // The engine key of the currently active tab.
        function activeEngine() {
            const active = document.querySelector('.engine-tab.active');
            return active ? active.dataset.engine : 'sapi5';
        }

        // Menu item hover effect
        const menuItems = document.querySelectorAll('.menu-item');
        menuItems.forEach(item => {
            item.addEventListener('mouseenter', () => {
                item.style.backgroundColor = '#e8e8e8';
            });
            item.addEventListener('mouseleave', () => {
                item.style.backgroundColor = '';
            });
        });

        // ─── TTS backend wiring (Tauri IPC) ──────────────────────────────────
        // `withGlobalTauri` is enabled, so the invoke() bridge is on window.__TAURI__.
        const invoke = window.__TAURI__?.core?.invoke;

        const voiceSelect = document.getElementById('voice-select');
        const rateSlider = document.getElementById('rate-slider');
        const pitchSlider = document.getElementById('pitch-slider');
        const volumeSlider = document.getElementById('volume-slider');

        async function call(cmd, args) {
            if (!invoke) {
                console.warn('Tauri bridge unavailable — running outside the app?');
                return;
            }
            try {
                await invoke(cmd, args);
            } catch (err) {
                console.error(`${cmd} failed:`, err);
                alert(String(err));
            }
        }

        document.getElementById('btn-play').addEventListener('click', () => {
            call('speak_text', {
                text: textEditor.value,
                engine: activeEngine(),
                voice: voiceSelect.value,
                rate: parseInt(rateSlider.value, 10),
                pitch: parseInt(pitchSlider.value, 10),
                volume: parseInt(volumeSlider.value, 10),
            });
        });

        document.getElementById('btn-pause').addEventListener('click', () => {
            call('pause_speaking');
        });

        document.getElementById('btn-stop').addEventListener('click', () => {
            call('stop_speaking');
        });

        document.getElementById('btn-install').addEventListener('click', () => {
            call('open_voice_settings');
        });

        // Populate the dropdown from the voices installed for the active engine.
        // Each option's value is the stable token id passed back to speak_text.
        const voiceCache = new Map();

        async function loadVoices({ force = false } = {}) {
            if (!invoke) return;
            const engine = activeEngine();
            try {
                const voices = !force && voiceCache.has(engine)
                    ? voiceCache.get(engine)
                    : await invoke('get_voices', { engine });
                voiceCache.set(engine, voices);
                voiceSelect.innerHTML = '';
                if (!voices || voices.length === 0) {
                    const opt = document.createElement('option');
                    opt.value = '';
                    opt.textContent = engine === 'ml'
                        ? 'No local ML/AI voices configured'
                        : engine === 'speech_platform'
                        ? 'No Speech Platform voices installed'
                        : 'No voices installed — click Install';
                    voiceSelect.appendChild(opt);
                    return;
                }
                for (const v of voices) {
                    const opt = document.createElement('option');
                    opt.value = v.id;
                    opt.textContent = v.name;
                    voiceSelect.appendChild(opt);
                }
            } catch (err) {
                console.error('get_voices failed:', err);
            }
        }
        loadVoices();
    </script>
</body>
</html>
