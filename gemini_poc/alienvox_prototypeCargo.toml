[package]
name = "alienvox"
version = "0.1.0"
edition = "2021"

[dependencies]
tauri = { version = "1.5", features = ["system-tray"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.52", features = ["Win32_UI_Accessibility", "Win32_System_DataExchange", "Win32_Media_Speech"] }

[target.'cfg(target_os = "macos")'.dependencies]
cocoa = "0.25"
objc = "0.2"
